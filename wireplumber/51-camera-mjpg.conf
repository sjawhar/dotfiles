# Force v4l2 camera nodes to passthrough MJPG instead of negotiating YUY2.
# Without this, PipeWire's format negotiation picks YUY2 raw (max 640x480)
# because Chromium requests raw video and YUY2 is listed first by the kernel.
# Passthrough MJPG lets the consumer (Chromium) decode it at full resolution.
monitor.v4l2.rules = [
  {
    matches = [
      {
        node.name = "~v4l2_input.*"
      }
    ]
    actions = {
      update-props = {
        node.param.PortConfig = {
          direction = Output
          mode      = passthrough
          format    = {
            mediaType    = video
            mediaSubtype = mjpg
            size         = { width = 1920, height = 1080 }
            framerate    = { num = 30, denom = 1 }
          }
        }
      }
    }
  }
]
