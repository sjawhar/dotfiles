# Override default video resolution from 640x480 to 1920x1080 @ 30fps
# This affects all apps accessing cameras through PipeWire (browsers, Zoom, etc.)
context.properties = {
    default.video.width  = 1920
    default.video.height = 1080
    default.video.rate.num = 30
    default.video.rate.denom = 1
}
