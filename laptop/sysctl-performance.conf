# Desktop performance tuning (adapted from Pop!_OS default-settings)
# https://github.com/pop-os/default-settings/blob/master_noble/etc/sysctl.d/10-pop-default-settings.conf

# Prefer evicting file cache over swapping app memory to disk.
# Kernel default 60 is tuned for HDDs. On SSD desktops, keeping working
# set in RAM and evicting cold file cache is much more responsive.
# Note: if using zram, configure its swappiness separately (e.g. 180).
vm.swappiness = 10

# Disable watermark boost (fragmentation-fighting reclaim).
# Default 15000 causes kswapd to reclaim memory even when plenty is free,
# just to reduce fragmentation for THP. On desktops that reboot regularly,
# fragmentation is not a concern; the latency spikes from unnecessary
# reclaim are. See Weiner's LKML patch for Facebook's reasoning:
# https://lore.kernel.org/lkml/20201020175833.397286-1-hannes@cmpxchg.org/
vm.watermark_boost_factor = 0

# Widen kswapd watermark gap from 0.1% to 1.25% of RAM.
# Default 10 = ~16MB headroom on 16GB; 125 = ~200MB. This means kswapd
# wakes earlier and maintains more free-page buffer, reducing allocstall
# direct reclaim stalls on allocation bursts.
# https://github.com/torvalds/linux/commit/795ae7a0de6b
vm.watermark_scale_factor = 125

# Cap dirty page accumulation at 256MB (background flush at 128MB).
# Ratio defaults (10%/20% of RAM) allow multi-GB dirty page buildup on
# large-RAM systems, causing multi-second write stalls when the limit hits.
# Fixed byte limits bound the stall duration regardless of RAM size.
# 256MB floor chosen for btrfs CoW compatibility (lower values hurt btrfs
# sequential write performance).
# https://lwn.net/Articles/572921/
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 134217728

# 8x more inotify instances (128 -> 1024).
# Default 128 is from 2005. A modern dev session (IDE + language servers +
# Docker containers + systemd + COSMIC desktop) easily consumes 40-60.
# Pop!_OS hit this with COSMIC apps silently stopping config file watching.
fs.inotify.max_user_instances = 1024
