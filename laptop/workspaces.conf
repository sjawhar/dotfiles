# Global workspace map (AeroSpace-style): drives generate-shortcuts.
# Columns: <global-ws> <monitor-query> <switch-chord> <move-chord>
# monitor-query = connector name or EDID model substring (cosmic-randr list; models are stable, connectors churn)
# Local workspace index on each monitor = order of that monitor's rows in this file.
# After editing: run laptop/generate-shortcuts --apply

