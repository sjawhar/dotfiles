# =============================================================================
# USBGuard Policy
# =============================================================================
#
# Threat model: physical USB attacks (malicious device in exposed port).
# Default: block all. Only devices matching explicit rules are allowed.
#
# Trust layers (most → least trusted):
#   1. Internal devices — pinned by hash (soldered to motherboard)
#   2. Personal peripherals — by id + name + with-interface (portable across docks)
#   3. Dock hubs — by hash + with-interface match-all (per-model, not per-unit)
#   4. Dock controllers/peripherals — by hash or id + name
#   5. Everything else — blocked
#
# Key design decisions:
#   - Omit parent-hash, via-port, with-connect-type — topology attrs that break
#     when you change docks or ports. We want rules portable across setups.
#   - Hubs pinned by hash, not vendor — hub chips (VIA, Microchip/SMSC) appear
#     in many docks; vendor wildcards would be too broad. Hash is per-model
#     (hubs lack serial numbers), which is the tightest non-topology granularity.
#   - Hub rules use match-all — the device's *entire* interface set must be hub
#     class. A composite device presenting hub + keyboard (BadUSB) gets rejected.
#   - Device rules use one-of — device just needs at least one expected interface.
#   - generate-policy is too strict (adds parent-hash, via-port). No flag to
#     suppress only parent-hash (upstream issue #503). Manual editing required.
#
# Daemon config (/etc/usbguard/usbguard-daemon.conf):
#   - DeviceRulesWithPort=false  (allow-device -p omits via-port, but still
#     adds parent-hash — strip it manually)
#   - IPCAllowedGroups=root plugdev  (plugdev can run usbguard without sudo)
#
# --- Workflows ---
#
# New dock:
#   1. Plug in. All hubs blocked, nothing behind it works.
#   2. sudo usbguard list-devices | grep block
#   3. sudo usbguard allow-device <ID>  (each hub, one at a time)
#      Downstream devices enumerate as hubs are approved. Known peripherals
#      auto-allow via their id rules. Unknown devices stay blocked.
#   4. Add hub hashes here. For pure hubs:
#        allow hash "<hash>" with-interface match-all { 09:00:00 09:00:01 09:00:02 }
#      For vendor-specific controllers (ff:ff:ff etc):
#        allow hash "<hash>"  # description
#   5. sudo systemctl restart usbguard && sleep 3 && sudo usbguard list-devices | grep block
#
# New personal device:
#   1. Plug in (blocked). Find it: sudo usbguard list-devices | grep block
#   2. Note id, name, with-interface. Add rule:
#        allow id <vendor>:<product> name "<name>" with-interface one-of { <interfaces> }
#   3. Restart and verify.
#
# =============================================================================


# --- Linux root hubs (kernel-internal, always present) ---
allow id 1d6b:*


# --- Internal devices (pinned by hash — never change topology) ---

