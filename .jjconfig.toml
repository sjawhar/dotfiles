# Shared jj config (symlinked to ~/.jjconfig.toml)
# User-specific settings (name, email) go in ~/.config/jj/config.toml
# which has higher priority and overrides settings here.

[revset-aliases]
'closest_bookmark(to)' = 'heads(::to & bookmarks())'

[aliases]
tug = ["bookmark", "move", "--from", "closest_bookmark(@)", "--to", "@"]

[ui]
editor = "nvim"

# Use git diff format when running inside AI agents
# (agents can't parse color-words output)
[[--scope]]
--when.environments = ["AGENT", "OPENCODE", "CLAUDECODE"]
[--scope.ui]
diff-formatter = ":git"

# Watchman-based filesystem monitor — avoids full tree walk on every command.
# Requires watchman installed (see installers/jj.sh).
[fsmonitor]
backend = "watchman"

# Git LFS support via jj fork (github.com/sjawhar/jj).
# ignore-filters skips LFS-tracked files during snapshot (no smudge/clean overhead).
# filter.drivers.lfs defines the filter commands for checkout/checkin when needed.
[git]
ignore-filters = ["lfs"]

[git.filter]
enabled = true

[git.filter.drivers.lfs]
required = true
clean = ["git-lfs", "clean", "--", "$path"]
smudge = ["git-lfs", "smudge", "--", "$path"]

