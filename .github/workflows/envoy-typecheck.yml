name: envoy-typecheck

on:
  push:
    branches: [main]
    paths:
      - "envoy/**"
      - ".github/workflows/envoy-typecheck.yml"
  pull_request:
    paths:
      - "envoy/**"
      - ".github/workflows/envoy-typecheck.yml"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: envoy/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: envoy
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: envoy
