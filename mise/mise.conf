# Mise data dir override.
#
# ~/.dotfiles/.bashrc exports MISE_DATA_DIR for interactive shells, but the
# systemd --user manager doesn't inherit it from a login shell. Without this,
# `mise` spawned from a user service falls back to the XDG default
# (~/.local/share/mise/) instead of the actual data dir (~/.mise/), so it
# can't find any installs.
#
# systemd reads environment.d at user-manager startup; for the current
# session also run:  systemctl --user set-environment MISE_DATA_DIR=$HOME/.mise
MISE_DATA_DIR=%h/.mise
