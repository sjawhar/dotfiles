# Global mise tool configuration
# Symlinked to ~/.config/mise/config.toml
# All versions pinned for reproducibility

[tools]
"github:sjawhar/jj" = "latest"  # Custom fork with workspace-cli, LFS ignore-filters, gitattr filter fixes
"github:sjawhar/opencode" = "latest"
"github:sjawhar/oh-my-opencode" = "latest"  # Custom fork
"npm:@openai/codex" = "0.92.0"  # OpenAI coding agent CLI
"npm:@googleworkspace/cli" = "0.7.0"  # Google Workspace CLI (Drive, Gmail, Calendar, etc.)
"github:korotovsky/slack-mcp-server" = "1.3.0"
bat = "0.26.1"      # Cat with syntax highlighting
bun = "1.3.13"
eza = "0.23.4"      # Modern ls with colors and git status
fd = "10.3.0"       # Fast, user-friendly find alternative
fzf = "0.67.0"      # Fuzzy finder (Ctrl+R for history, Alt+C for directories)
gh = "latest"
glow = "2.1.1"      # Terminal markdown reader
jq = "1.8.1"        # JSON processor
neovim = "0.11.6"  # Text editor
"github:tmux/tmux-builds" = "3.6a"  # Pre-built binary (extended keys, codepoint widths, scrollbars)
node = "22.22.0"    # Node.js runtime
opentofu = "1.11.3" # Terraform alternative
ripgrep = "15.1.0"  # Fast grep that respects .gitignore
rust = "1.92.0"  # Rust toolchain for local development
starship = "1.24.2" # Shell prompt
uv = "0.10.9"       # Python package manager & project tool
yq = "4.50.1"       # YAML processor
zoxide = "0.9.8"    # Smart directory jumping (z command)

# Development
"npm:basedpyright" = "1.29.1"  # Python LSP (pyright fork with extras)

# Cloud
awscli = "2.33.2"   # AWS command-line interface

# Secrets management
age = "1.3.1"       # Modern file encryption (for sops)
sops = "3.11.0"     # Encrypted secrets management (sops + age)
cmake = "4.3.0"
go = "1.24.0"
actionlint = "latest"

# Observability
sentry-cli = "3.5.1"  # Sentry CLI (getsentry/cli) — releases, sourcemaps, issue/event queries

# AI-native time tracker — one release publishes two binaries as separate assets:
#   tt-{arch}-unknown-linux-musl.tar.gz  (CLI, static)
#   tt-watcher-{arch}-unknown-linux-gnu.tar.gz  (COSMIC daemon, glibc)
# Use [tool_alias] + per-platform asset_pattern (the documented mise pattern for
# multiple assets from one release). Distinct aliases give each binary its own
# install dir; bare "github:sjawhar/time-tracker" entry must NOT coexist or it
# collides on the install path.
[tool_alias]
tt = "github:sjawhar/time-tracker"
tt-watcher = "github:sjawhar/time-tracker"

[tools.tt]
version = "latest"
platforms.linux-x64   = { asset_pattern = "tt-x86_64-unknown-linux-musl.tar.gz" }
platforms.linux-arm64 = { asset_pattern = "tt-aarch64-unknown-linux-musl.tar.gz" }

[tools.tt-watcher]
version = "latest"
platforms.linux-x64   = { asset_pattern = "tt-watcher-x86_64-unknown-linux-gnu.tar.gz" }
platforms.linux-arm64 = { asset_pattern = "tt-watcher-aarch64-unknown-linux-gnu.tar.gz" }
